<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>CFE Monitor</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="screen">
      <header class="topbar">
        <section class="brand" aria-label="EEPAT">
          <img
            class="brand-logo"
            src="/static/brand/eepat_blanco.svg"
            alt="EEPAT"
          >
        </section>
        <section class="status" id="status-panel">
          <span class="status-dot" id="status-dot"></span>
          <div>
            <p class="status-label" id="status-label">Cargando</p>
            <p class="status-detail" id="status-detail">SIN DATOS</p>
          </div>
        </section>
        <section class="environment-panel" aria-label="Fecha, hora y clima">
          <div class="clock" aria-label="Fecha y hora actual">
            <strong id="clock-time">--:--:--</strong>
            <span id="clock-date">--/--/----</span>
          </div>
          <div class="weather" aria-label="Clima">
            <img
              class="weather-icon"
              id="weather-icon"
              src="/static/weather-icons/unknown.svg"
              alt="Clima no disponible"
            >
            <div>
              <strong id="weather-temp">--&deg;C</strong>
              <span id="weather-condition">Clima pendiente</span>
            </div>
          </div>
          <div class="wifi" aria-label="Señal WiFi">
            <img
              class="wifi-icon"
              id="wifi-icon"
              src="/static/wifi-icons/wifi_0.svg"
              alt="Sin señal WiFi"
            >
            <span class="wifi-ssid" id="wifi-ssid">Sin red</span>
          </div>
        </section>
      </header>

      <section class="metrics">
        <div>
          <span class="metric-label" id="metric-count-label">CONCURSOS PUBLICADOS HOY</span>
          <strong id="metric-count">0</strong>
        </div>
        <div>
          <span class="metric-label">ÚLTIMA PUBLICACIÓN</span>
          <strong id="metric-last">--</strong>
        </div>
        <div>
          <span class="metric-label">ACTUALIZADO</span>
          <strong id="metric-updated">--</strong>
        </div>
        <div class="activity-chart" aria-label="Concursos publicados en los últimos 7 días">
          <div class="activity-chart-header">
            <span class="activity-total" id="activity-total">ÚLTIMOS 7 DÍAS: <span class="activity-count-number">0</span> CONCURSOS EN TOTAL</span>
          </div>
          <div class="activity-bars" id="activity-bars"></div>
        </div>
      </section>

      <p class="table-mode" id="table-mode">Mostrando todos los concursos</p>

      <section class="board">
        <table>
          <thead>
            <tr>
              <th>NÚMERO</th>
              <th>ENTIDAD</th>
              <th>TIPO</th>
              <th>PUBLICACIÓN</th>
              <th>DESCRIPCIÓN</th>
            </tr>
          </thead>
          <tbody id="concursos-body">
            <tr>
              <td colspan="5" class="empty">Cargando concursos...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <script src="/static/dashboard.js"></script>
  </body>
</html>
